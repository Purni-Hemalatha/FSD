<!DOCTYPE html>
<html>
<head>
    <title>Armstrong Number</title>

    <script>
        function checkArmstrong() {

            var num = parseInt(prompt("Enter a number:"));
            var originalNumber = num;
            var sum = 0;
            var remainder;

            while (num > 0) {
                remainder = num % 10;       
                sum = sum + (remainder * remainder * remainder); 
                num = parseInt(num / 10);    
            }

            if (sum == originalNumber) {
                alert(originalNumber + " is an ARMSTRONG NUMBER");
                document.write("<h2>" + originalNumber + " is an ARMSTRONG NUMBER</h2>");
            } else {
                alert(originalNumber + " is NOT an Armstrong Number");
                document.write("<h2>" + originalNumber + " is NOT an Armstrong Number</h2>");
            }
        }
    </script>
</head>

<body onload="checkArmstrong()">
    <h2>Check Armstrong Number</h2>
</body>
</html>
