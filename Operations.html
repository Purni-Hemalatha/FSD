<!DOCTYPE html>
<html>
<head>
    <title>Number Operations</title>

    <script>

        function getNumber() {
            return parseInt(document.getElementById("num").value);
        }

        function factorial() {
            var n = getNumber();
            var fact = 1;

            for (var i = 1; i <= n; i++) {
                fact *= i;
            }

            document.getElementById("result").innerHTML =
                "Factorial of " + n + " is: " + fact;
        }

        function fibonacci() {
            var n = getNumber();
            var a = 0, b = 1, next;
            var output = "Fibonacci Series: " + a + " " + b + " ";

            while (true) {
                next = a + b;
                if (next > n)
                    break;
                output += next + " ";
                a = b;
                b = next;
            }

            document.getElementById("result").innerHTML = output;
        }

        function prime() {
            var n = getNumber();
            var output = "Prime Numbers: ";

            for (var i = 2; i <= n; i++) {
                var isPrime = true;

                for (var j = 2; j <= i / 2; j++) {
                    if (i % j == 0) {
                        isPrime = false;
                        break;
                    }
                }

                if (isPrime)
                    output += i + " ";
            }

            document.getElementById("result").innerHTML = output;
        }

        function palindrome() {
            var n = getNumber();
            var original = n;
            var reversed = 0;

            while (n > 0) {
                reversed = reversed * 10 + (n % 10);
                n = parseInt(n / 10);
            }

            if (original == reversed)
                document.getElementById("result").innerHTML =
                    original + " is a Palindrome Number";
            else
                document.getElementById("result").innerHTML =
                    original + " is NOT a Palindrome Number";
        }

    </script>
</head>

<body>

    <h2>Number Operations Using Buttons</h2>

    Enter a Number:
    <input type="text" id="num">

    <br><br>

    <button onclick="factorial()">Factorial</button>
    <button onclick="fibonacci()">Fibonacci</button>
    <button onclick="prime()">Prime</button>
    <button onclick="palindrome()">Palindrome</button>

    <h3 id="result"></h3>

</body>
</html>
