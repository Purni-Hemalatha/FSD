<!DOCTYPE html>
<html>
<head>
    <title>Largest Number Program</title>

    <script>
        function checkLargest() 
{
            var num1 = parseInt(prompt("Enter first integer:"));
            var num2 = parseInt(prompt("Enter second integer:"));
            var num3 = parseInt(prompt("Enter third integer:"));
            var result;
            if (num1 == num2 && num2 == num3) {
                result = "EQUAL NUMBERS";
                alert(result);
                document.write("<h2>" + result + "</h2>");
            }
            else {
                var largest = num1;

                if (num2 > largest) {
                    largest = num2;
                }

                if (num3 > largest) {
                    largest = num3;
                }

                result = largest + " LARGER NUMBER";

                alert(result);  
                document.write("<h2>" + result + "</h2>");
            }
        }
    </script>
</head>

<body onload="checkLargest()">

    <h2>Check Largest of Three Numbers</h2>

</body>
</html>
