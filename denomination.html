<!DOCTYPE html>
<html>
<head>
    <title>Denomination Program</title>

    <script>
        function calculateDenomination() {

            var amount = parseInt(prompt("Enter deposited amount:"));
            var originalAmount = amount;

            var note100 = 0, note50 = 0, note20 = 0;
            var note10 = 0, note5 = 0, note2 = 0, note1 = 0;

            note100 = parseInt(amount / 100);
            amount = amount % 100;

            note50 = parseInt(amount / 50);
            amount = amount % 50;

            note20 = parseInt(amount / 20);
            amount = amount % 20;

            note10 = parseInt(amount / 10);
            amount = amount % 10;

            note5 = parseInt(amount / 5);
            amount = amount % 5;

            note2 = parseInt(amount / 2);
            amount = amount % 2;

            note1 = amount;

            document.write("<h2>Denomination for Rs. " + originalAmount + "</h2>");
            document.write("100's : " + note100 + "<br>");
            document.write("50's : " + note50 + "<br>");
            document.write("20's : " + note20 + "<br>");
            document.write("10's : " + note10 + "<br>");
            document.write("5's  : " + note5 + "<br>");
            document.write("2's  : " + note2 + "<br>");
            document.write("1's  : " + note1 + "<br>");
        }
    </script>
</head>

<body onload="calculateDenomination()">
    <h2>Bank Denomination Calculator</h2>
</body>
</html>
