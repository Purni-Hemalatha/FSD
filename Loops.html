<!DOCTYPE html>
<html>
<head>
    <title>Print 1 to 10 using Loops</title>

    <script>
        function printNumbers() {

            document.write("<h3>Using For Loop</h3>");
            for (var i = 1; i <= 10; i++) {
                document.write(i + "<br>");
            }

            document.write("<h3>Using While Loop</h3>");
            var j = 1;
            while (j <= 10) {
                document.write(j + "<br>");
                j++;
            }

            document.write("<h3>Using Do-While Loop</h3>");
            var k = 1;
            do {
                document.write(k + "<br>");
                k++;
            } while (k <= 10);
        }
    </script>

</head>

<body onload="printNumbers()">

    <h2>Print Numbers from 1 to 10</h2>

</body>
</html>
